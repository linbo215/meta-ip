name: Cloudflare IP Auto Sync

on:
  schedule:
    # 北京时间每天 10:00 和 22:00 自动运行
    - cron: '0 2,14 * * *'
  workflow_dispatch: # 支持你在网页上随时手动点击运行

jobs:
  sync_ip:
    runs-on: ubuntu-latest

    steps:
      # 1. 正常的拉取当前仓库代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 正常的初始化 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装脚本需要的 requests 依赖
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      # 4. 纯粹地运行你的脚本，生成 cf_ips.txt
      - name: Run Extract Script
        run: |
          echo "📡 开始执行独立清洗..."
          python process_cf_ip.py

      # 5. 把生成的 cf_ips.txt 保存回当前 meta-ip 仓库中
      - name: Save Result to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查文件是否存在并添加
          if [ -f "cf_ips.txt" ]; then
            git add cf_ips.txt
            
            # 只有当内容真的发生改变时才提交，防止没有更新时报错
            if git diff --staged --quiet; then
              echo "ℹ️ 内容没有变化，跳过提交。"
            else
              git commit -m "📊 Cloudflare IP Auto Update [skip ci]"
              git push origin main
            fi
          else
            echo "❌ 未检测到生成的文件！"
            exit 1
          fi
