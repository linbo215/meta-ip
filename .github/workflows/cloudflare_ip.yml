name: Cloudflare IP Daily Refresh

on:
  schedule:
    # 每天固定在 02:00 和 14:00 触发（UTC 时间 18:00 和 06:00）
    - cron: '0 6,18 * * *'
  workflow_dispatch: # 支持手动点击运行

jobs:
  extract_ip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Run Extract Script
        run: |
          echo "📡 开始抓取并清洗 Cloudflare 优质 IP 表格..."
          if [ -f "py/process_cf_ip.py" ]; then
            python py/process_cf_ip.py
          else
            echo "❌ 错误：找不到 py/process_cf_ip.py 脚本！"
            exit 1
          fi

      - name: 🚀 纯 Git 命令：单独强推 CF IP 到私有库
        env:
          LIVE_TOKEN: ${{ secrets.LIVE_TOKEN }}
        run: |
          echo "📥 准备独立推送 cf_ips.txt..."
          
          # 1. 配置临时 Git 机器人身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 强行清除当前的本地 Git 历史缓存，防止跨库历史冲突
          rm -rf .git
          
          # 3. 重新初始化一个干净的本地 Git
          git init
          git branch -M main
          
          # 4. 【核心区别】：这里只添加独立生成的 cf_ips.txt，绝不包含任何酒店源文件
          if [ -f "cf_ips.txt" ]; then
            git add cf_ips.txt
          else
            echo "❌ 错误：未找到生成的 cf_ips.txt 文件，终止推送！"
            exit 1
          fi
          
          # 5. 提交
          git commit -m "📊 Cloudflare IP Refresh (Independent) [skip ci]"
          
          # 6. 带上 Token 强推到私库（注意：由于使用了 --force，私库中如果原本有这个文件会被直接覆盖更新）
          git push --force https://${{ secrets.LIVE_TOKEN }}@github.com/linbo215/ken.git main
