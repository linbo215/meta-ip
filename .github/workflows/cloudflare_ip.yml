name: Cloudflare IP Auto Sync

on:
  schedule:
    # 每天固定在 02:00 和 14:00 触发（北京时间 10:00 和 22:00）
    - cron: '0 2,14 * * *'
  workflow_dispatch: # 支持随时手动点击运行

jobs:
  sync_ip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Run Extract Script
        run: |
          echo "📡 开始执行独立清洗..."
          python process_cf_ip.py

      - name: 🚀 纯 Git 命令：安全强推到你的私有库
        env:
          # 显式引入密钥
          MY_TOKEN: ${{ secrets.LIVE_TOKEN }}
        run: |
          echo "📥 正在初始化独立的 Git 提交环境..."
          
          # 1. 配置临时机器人身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 销毁当前库的克隆历史，防止跨库提交污染
          rm -rf .git
          
          # 3. 重新建立一个纯净无污染的本地单文件分支
          git init
          git branch -M main
          
          # 4. 只把刚才洗好的结果文件加进来
          if [ -f "cf_ips.txt" ]; then
            git add cf_ips.txt
          else
            echo "❌ 未检测到生成的文件，终止运行！"
            exit 1
          fi
          
          git commit -m "📊 Cloudflare IP Sync (Independent) [skip ci]"
          
          # 5. 【核心修复】：使用标准的 x-access-token 嵌入格式进行强推，彻底解决 128 鉴权错误
          git push --force https://x-access-token:${{ secrets.LIVE_TOKEN }}@github.com/linbo215/ken.git main
