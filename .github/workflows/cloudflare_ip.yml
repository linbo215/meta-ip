name: Cloudflare IP Auto Sync

on:
  schedule:
    # 每天固定在 02:00 和 14:00 触发（北京时间 10:00 和 22:00）
    - cron: '0 2,14 * * *'
  workflow_dispatch: # 支持随时手动点击运行

jobs:
  sync_ip:
    runs-on: ubuntu-latest
    
    # 💡 核心：必须赋予当前工作流对本仓库的写入权限
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Run Extract Script
        run: |
          echo "📡 开始执行表格清洗..."
          python process_cf_ip.py

      - name: 🚀 自动提交并更新文件到本仓库
        run: |
          echo "📥 正在检查文件变更并提交到 meta-ip 仓库..."
          
          # 1. 配置临时机器人身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 正常添加生成的文件
          if [ -f "cf_ips.txt" ]; then
            git add cf_ips.txt
          else
            echo "❌ 未检测到生成的文件，终止运行！"
            exit 1
          fi
          
          # 3. 检查是否有内容变动，有则提交，无则跳过（防止没有新 IP 时工作流报错）
          if git diff --staged --quiet; then
            echo "📊 今日
